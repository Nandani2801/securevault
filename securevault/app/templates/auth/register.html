{% extends "base.html" %}
{% block title %}Register — SecureVault{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🔐</span>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Set up your SecureVault</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <!-- A07: type="text" not "email" — no browser validation either -->
                <input type="text" id="email" name="email" class="form-input" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Master Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" class="form-input" placeholder="Choose a master password" required>
                    <button type="button" class="toggle-pw" onclick="togglePassword('password')">👁</button>
                </div>
                <!-- A07: No strength hint, no minimum length enforced -->
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Vault</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Sign in</a></p>
        </div>

        <div class="vuln-note">
            <span class="vuln-tag">A07</span>
            <small>No password strength enforcement. Password <code>1</code> is accepted.</small>
        </div>
    </div>
</div>
{% endblock %}
