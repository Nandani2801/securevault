{% extends "base.html" %}
{% block title %}Login — SecureVault{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🔐</span>
            <h1 class="auth-title">SecureVault</h1>
            <p class="auth-subtitle">Sign in to access your vault</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input"
                    placeholder="Enter your username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Master Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Enter your master password" autocomplete="current-password" required>
                    <button type="button" class="toggle-pw" onclick="togglePassword('password')">👁</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Unlock Vault</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}" class="auth-link">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
