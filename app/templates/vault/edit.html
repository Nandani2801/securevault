{% extends "base.html" %}
{% block title %}Edit Entry — SecureVault{% endblock %}

{% block content %}
<div class="page-container page-narrow">
    <div class="page-header">
        <div>
            <h1 class="page-title">Edit Credential</h1>
            <p class="page-subtitle">Modifying: {{ entry.site_name }}</p>
        </div>
        <a href="{{ url_for('vault.index') }}" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('vault.edit', entry_id=entry.id) }}" class="form">
            <div class="form-group">
                <label class="form-label">Site Name</label>
                <input type="text" name="site_name" class="form-input" value="{{ entry.site_name }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Site URL</label>
                <input type="text" name="site_url" class="form-input" value="{{ entry.site_url or '' }}">
            </div>
            <div class="form-group">
                <label class="form-label">Username / Email</label>
                <input type="text" name="username" class="form-input" value="{{ entry.username }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="vault-password" class="form-input"
                           value="{{ entry.plain_password }}" placeholder="Leave blank to keep current">
                    <button type="button" class="toggle-pw" onclick="togglePassword('vault-password')">👁</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-input form-textarea">{{ entry.notes or '' }}</textarea>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('vault.index') }}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Update Entry</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
