name: Bandit Scan

on:
  push:
    branches: ["devsecops-setup1"]
  pull_request:
    branches: ["devsecops-setup1"]
  workflow_dispatch:

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit
      - name: Run Bandit
        run: bandit -r CTFd/ -ll | tee bandit-report.txt
        continue-on-error: true

      - name: Generate Security Dashboard Summary
        if: always()
        continue-on-error: true
        run: |
          echo "## 🛡️ Bandit Scan Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat bandit-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
