name: DevSecOps CI

on:
  push:
    branches: ["devsecops-setup1"]
  pull_request:
    branches: ["devsecops-setup1"]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pylint bandit pytest pytest-cov

      - name: Run Pylint
        run: pylint CTFd/ --fail-under=7 --ignore=migrations
        continue-on-error: true

      - name: Run Bandit
        run: bandit -r CTFd/ -ll
        continue-on-error: true

      - name: Run Unit Tests
        run: |
          cd CTFd
          pytest tests/ -v --tb=short --ignore=tests/cache
        continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
