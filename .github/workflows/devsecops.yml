name: DevSecOps CI

on:
  push:
    branches: ["main"]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pylint bandit

    - name: Run Pylint
      run: pylint CTFd/ --fail-under=7

    - name: Run Bandit
      run: bandit -r CTFd/ -ll