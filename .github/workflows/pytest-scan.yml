name: Pytest Unit Tests

on:
  push:
    branches: ["devsecops-setup1"]
  pull_request:
    branches: ["devsecops-setup1"]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run Unit Tests
        run: |
          cd CTFd
          pytest tests/ -v --tb=short --ignore=tests/cache | tee pytest-report.txt
        continue-on-error: true

      - name: Generate Security Dashboard Summary
        if: always()
        continue-on-error: true
        run: |
          echo "## 🧪 Pytest Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat CTFd/pytest-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
