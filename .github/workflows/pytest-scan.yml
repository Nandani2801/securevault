name: Pytest Unit Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r securevault/requirements.txt -r securevault/requirements-dev.txt
          pip install pytest pytest-cov
      - name: Run Unit Tests
        run: |
          set -o pipefail
          cd securevault
          pytest tests/ -v --tb=short | tee pytest-report.txt

      - name: Generate Security Dashboard Summary
        if: always()
        run: |
          echo "## 🧪 Pytest Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat securevault/pytest-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
