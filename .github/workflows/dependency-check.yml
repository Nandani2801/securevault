name: OWASP Dependency Check Pipeline

# This tells GitHub to run the scan every time code is pushed
on:
  push:
    branches: [ "main", "devsecops-setup1", "test/dependency-check" ] 
  pull_request:
    branches: [ "main", "devsecops-setup1" ]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Create report directory
      - name: Create Report Directory
        run: mkdir -p odc-reports

      # 2. Run OWASP Dependency-Check via Docker (Now outputting HTML and JSON)
      - name: Run OWASP Dependency-Check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ${{ github.workspace }}/odc-reports:/report \
            owasp/dependency-check:latest \
            --project "HPE-CPP3-TEAM-4-CTFd" \
            --scan /src \
            --format HTML --format JSON \
            --out /report \
            --enableExperimental
        continue-on-error: true

      # 3. Generate Dynamic Security Dashboard
      - name: Generate Security Dashboard Summary
        if: always()
        continue-on-error: true
        run: |
          # Check if the JSON report was actually generated
          if [ -f "odc-reports/dependency-check-report.json" ]; then
            # Extract numbers using jq
            TOTAL_DEPS=$(jq '.dependencies | length' odc-reports/dependency-check-report.json)
            VULN_DEPS=$(jq '.dependencies | map(select(has("vulnerabilities"))) | length' odc-reports/dependency-check-report.json)
            
            # Print the dynamic dashboard
            cat << EOF >> $GITHUB_STEP_SUMMARY
            ## 🛡️ OWASP Dependency-Check Results
            The scan completed successfully. Here is the high-level summary:
            
            * **📦 Total Dependencies Scanned:** $TOTAL_DEPS
            * **🚨 Vulnerable Dependencies Found:** $VULN_DEPS
            
            ### 🔍 Next Steps for the Team:
            1. Scroll to the bottom of this summary page to the **Artifacts** section.
            2. Download the \`OWASP-Dependency-Check-Report\` zip file.
            3. Extract and open the HTML file to view detailed CVE descriptions and mitigation steps.
            EOF
          else
            # Print an error dashboard if the NVD download failed or crashed
            cat << EOF >> $GITHUB_STEP_SUMMARY
            ## 🛡️ OWASP Dependency-Check Results
            ⚠️ **WARNING: The scan failed to generate a report.** Please check the terminal logs in the 'Run OWASP Dependency-Check' step above to see what went wrong.
            EOF
          fi